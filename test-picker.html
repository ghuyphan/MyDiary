<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.test-container {
  width: 320px;
  height: 568px;
  margin: 50px auto;
  position: relative;
  overflow: hidden;
  background: #eee;
  border: 2px solid black;
}

.scrim {
  position: absolute;
  inset: 0;
  z-index: 280;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: flex-end;
}

.panel {
  width: 100%;
  background: #f8f8f8;
  border-radius: 13px 13px 0 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid #ccc;
  font: 16px -apple-system, sans-serif;
}

.wheels-container {
  position: relative;
  height: 216px;
  display: flex;
  background: #f7f7f7;
  overflow: hidden;
}

.wheel-wrapper {
  flex: 1;
  position: relative;
  height: 216px;
  overflow: hidden;
}

.wheel {
  width: 100%;
  height: 216px;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  text-align: center;
}
.wheel::-webkit-scrollbar { display: none; }

.spacer {
  height: 90px;
  flex-shrink: 0;
}

.item {
  height: 36px;
  line-height: 36px;
  font: 20px -apple-system, sans-serif;
  color: #999;
  cursor: pointer;
}
.item.selected {
  color: #000;
  font-size: 22px;
}

.indicator {
  position: absolute;
  left: 8px;
  right: 8px;
  top: 90px;
  height: 36px;
  border-top: 1px solid rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(0,0,0,0.2);
  pointer-events: none;
  z-index: 10;
}

/* Fade overlays - pointer-events: none so scrolling passes through */
.wheel-wrapper::before,
.wheel-wrapper::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 90px;
  z-index: 2;
  pointer-events: none;
}
.wheel-wrapper::before {
  top: 0;
  background: linear-gradient(to bottom, rgba(247,247,247,1), transparent);
}
.wheel-wrapper::after {
  bottom: 0;
  background: linear-gradient(to top, rgba(247,247,247,1), transparent);
}

#status {
  position: fixed;
  top: 10px;
  left: 10px;
  background: #000;
  color: lime;
  padding: 10px;
  font: 14px monospace;
  z-index: 9999;
}
</style>
</head>
<body>
<div id="status">Scroll the wheel below...</div>

<div class="test-container">
  <div class="scrim">
    <div class="panel">
      <div class="header">Test Picker</div>
      <div class="wheels-container">
        <div class="indicator"></div>
        <div class="wheel-wrapper">
          <div class="wheel" id="wheel1">
            <div class="spacer"></div>
            <!-- items generated by JS -->
            <div class="spacer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const wheel = document.getElementById('wheel1');
const spacers = wheel.querySelectorAll('.spacer');
const items = [];
for (let i = 1; i <= 31; i++) {
  const div = document.createElement('div');
  div.className = 'item';
  div.textContent = i;
  items.push(div);
}
// Insert items between spacers
items.forEach(item => spacers[0].after(item));
// Reverse so they're in order
const allItems = wheel.querySelectorAll('.item');

wheel.addEventListener('scroll', () => {
  const idx = Math.round(wheel.scrollTop / 36);
  document.getElementById('status').textContent = 
    `scrollTop: ${wheel.scrollTop}, idx: ${idx}, scrollHeight: ${wheel.scrollHeight}, clientHeight: ${wheel.clientHeight}`;
  allItems.forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
});

// Initial position
wheel.scrollTop = 5 * 36;
</script>
</body>
</html>
